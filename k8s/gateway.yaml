apiVersion: v1
kind: Service
metadata:
  name: arcana-gateway
  namespace: arcana
spec:
  selector:
    app: arcana-gateway
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arcana-gateway
  namespace: arcana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arcana-gateway
  template:
    metadata:
      labels:
        app: arcana-gateway
    spec:
      containers:
        - name: gateway
          image: arcana:latest
          ports:
            - containerPort: 8000
          env:
            - name: ARCANA_NATS_URL
              value: nats://nats.halo-fleet:4222
            - name: ARCANA_CHROMA_HOST
              value: arcana-chromadb
            - name: ARCANA_UPLOADS_DIR
              value: /data/uploads
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: arcana-api-keys
                  key: OPENAI_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: arcana-api-keys
                  key: ANTHROPIC_API_KEY
            - name: LANGSMITH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: arcana-api-keys
                  key: LANGSMITH_API_KEY
            - name: ARCANA_DB_URL
              valueFrom:
                secretKeyRef:
                  name: arcana-db
                  key: ARCANA_DB_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - name: uploads
              mountPath: /data/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: arcana-uploads
