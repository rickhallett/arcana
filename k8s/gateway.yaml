apiVersion: v1
kind: Service
metadata:
  name: arcana-gateway
  namespace: arcana
spec:
  selector:
    app: arcana-gateway
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arcana-gateway
  namespace: arcana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arcana-gateway
  template:
    metadata:
      labels:
        app: arcana-gateway
    spec:
      containers:
        - name: gateway
          image: docker.io/library/arcana:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: ARCANA_NATS_URL
              value: nats://nats.halo-fleet:4222
            - name: ARCANA_CHROMA_HOST
              value: arcana-chromadb
            - name: ARCANA_UPLOADS_DIR
              value: /data/uploads
            - name: ARCANA_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: arcana-api-keys
                  key: ARCANA_OPENAI_API_KEY
            - name: ARCANA_ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: arcana-api-keys
                  key: ARCANA_ANTHROPIC_API_KEY
            - name: ARCANA_LANGSMITH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: arcana-api-keys
                  key: ARCANA_LANGSMITH_API_KEY
            - name: ARCANA_DB_URL
              value: "sqlite+aiosqlite:////data/uploads/arcana.db"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - name: uploads
              mountPath: /data/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: arcana-uploads
