apiVersion: v1
kind: Service
metadata:
  name: arcana-postgres
  namespace: arcana
spec:
  selector:
    app: arcana-postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: arcana-postgres
  namespace: arcana
spec:
  serviceName: arcana-postgres
  replicas: 1
  selector:
    matchLabels:
      app: arcana-postgres
  template:
    metadata:
      labels:
        app: arcana-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: arcana
            - name: POSTGRES_USER
              value: arcana
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: arcana-db
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: pg-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
