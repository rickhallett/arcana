apiVersion: v1
kind: Service
metadata:
  name: arcana-chromadb
  namespace: arcana
spec:
  selector:
    app: arcana-chromadb
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: arcana-chroma-data
  namespace: arcana
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arcana-chromadb
  namespace: arcana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arcana-chromadb
  template:
    metadata:
      labels:
        app: arcana-chromadb
    spec:
      containers:
        - name: chromadb
          image: chromadb/chroma:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - name: chroma-data
              mountPath: /chroma/chroma
      volumes:
        - name: chroma-data
          persistentVolumeClaim:
            claimName: arcana-chroma-data
